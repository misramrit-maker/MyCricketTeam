<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Athlone CC</title>
<style>
  :root {
    --bg:#050d12; --surface:#091620; --surfaceB:#060f18;
    --border:#0a3d2a; --accent:#00ff9d; --accentB:#00e5b0;
    --text:#00ff9d; --muted:#2a7a54; --danger:#ff2d55;
    --nav-h:68px;
    --glow:0 0 16px #00ff9d55; --glowG:0 0 16px #00e5b055;
  }
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  html, body { height:100%; overflow:hidden; }
  body {
    background:var(--bg);
    background-image:
      radial-gradient(ellipse at 20% 0%, #00ff9d0a 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, #00ff9d08 0%, transparent 60%);
    color:var(--text);
    font-family:'Courier New', monospace;
    display:flex; flex-direction:column;
  }
  body::after {
    content:''; position:fixed; inset:0;
    background:repeating-linear-gradient(0deg, transparent, transparent 2px, #00000018 2px, #00000018 4px);
    pointer-events:none; z-index:9999;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width:4px; }
  ::-webkit-scrollbar-track { background:#050d12; }
  ::-webkit-scrollbar-thumb { background:#00ff9d33; border-radius:2px; }

  /* ── Top bar ── */
  #topbar {
    background:#060e16; border-bottom:1px solid #00ff9d44;
    padding:12px 20px; display:flex; align-items:center; gap:14;
    flex-shrink:0; box-shadow:var(--glow);
  }
  #topbar .logo {
    width:38px; height:38px; border-radius:4px;
    background:#00ff9d18; border:1px solid var(--accent);
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0; box-shadow:var(--glow);
  }
  #topbar .club-name {
    font-size:14px; font-weight:900; color:var(--text);
    letter-spacing:.12em; text-transform:uppercase;
    text-shadow:0 0 12px #00ff9d88;
  }
  #topbar .sys-line {
    font-size:9px; color:var(--accent); letter-spacing:.2em; margin-top:2px;
  }
  .status-dot {
    width:6px; height:6px; border-radius:50%;
    background:var(--accentB); box-shadow:var(--glowG);
    margin-left:auto; animation:blink 2s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── Page container ── */
  #page {
    flex:1; overflow-y:auto;
    padding:20px 16px; padding-bottom:calc(var(--nav-h) + 20px);
  }

  /* ── Bottom nav ── */
  #nav {
    position:fixed; bottom:0; left:0; right:0;
    height:var(--nav-h); background:#040c12;
    border-top:1px solid #00ff9d55; display:flex; z-index:100;
    box-shadow:0 -4px 24px #00ff9d18;
  }
  .nav-btn {
    flex:1; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:3;
    border:none; cursor:pointer; background:transparent;
    color:var(--muted); border-top:2px solid transparent;
    font-family:'Courier New',monospace;
    font-size:9px; font-weight:700;
    letter-spacing:.12em; text-transform:uppercase;
    transition:all .2s; padding:0;
  }
  .nav-btn.active {
    color:var(--accent); background:#00ff9d14;
    border-top:2px solid var(--accent);
    box-shadow:inset 0 -2px 12px #00ff9d22;
  }
  .nav-btn svg { transition:filter .2s; }
  .nav-btn.active svg { filter:drop-shadow(0 0 4px var(--accent)); }

  /* ── Page header ── */
  .page-header { margin-bottom:24px; }
  .page-header .sys-tag {
    font-size:10px; color:var(--accent); letter-spacing:.2em;
    text-transform:uppercase; margin-bottom:4px;
  }
  .page-header h1 {
    font-size:22px; font-weight:900; color:var(--text);
    letter-spacing:.04em; text-transform:uppercase;
    text-shadow:0 0 20px #00ff9d66;
  }
  .page-header .sub {
    margin-top:5px; font-size:11px; color:var(--muted); letter-spacing:.05em;
  }
  .page-header .header-row {
    display:flex; align-items:flex-start; justify-content:space-between;
  }
  .page-header .divider {
    height:1px; background:linear-gradient(90deg,var(--accent),transparent);
    margin-top:14px;
  }

  /* ── Card ── */
  .card {
    background:linear-gradient(135deg,#091a28 0%,#060f18 100%);
    border:1px solid #00ff9d33; border-radius:4px;
    padding:18px; margin-bottom:12px;
    box-shadow:0 0 20px #00ff9d0a, inset 0 1px 0 #00ff9d22;
    position:relative; overflow:hidden;
  }

  /* ── Pill ── */
  .pill {
    display:inline-block; padding:2px 10px; border-radius:2px;
    font-size:10px; font-weight:700; letter-spacing:.06em;
    font-family:'Courier New',monospace;
  }

  /* ── Buttons ── */
  .btn {
    display:inline-flex; align-items:center; gap:6px;
    padding:9px 16px; border-radius:2px; border:none;
    cursor:pointer; font-family:'Courier New',monospace;
    font-size:12px; font-weight:700; letter-spacing:.08em;
    text-transform:uppercase; transition:all .2s;
  }
  .btn-primary { background:transparent; border:1px solid var(--accent); color:var(--accent); box-shadow:var(--glow); }
  .btn-primary:hover { background:#00ff9d18; }
  .btn-ghost { background:transparent; border:1px solid var(--border); color:var(--muted); }
  .btn-ghost:hover { border-color:var(--accent); color:var(--accent); }
  .btn-danger { background:transparent; border:1px solid #ff2d5566; color:#ff2d55; box-shadow:0 0 10px #ff2d5533; }
  .btn-small { padding:7px 12px; font-size:11px; }

  /* ── Inputs ── */
  .input {
    background:#071218; border:1px solid #00ff9d44; border-radius:4px;
    padding:10px 12px; color:var(--text);
    font-family:'Courier New',monospace; font-size:13px;
    outline:none; width:100%;
    box-shadow:inset 0 0 8px #00ff9d11;
    transition:border-color .2s;
  }
  .input:focus { border-color:var(--accent); box-shadow:inset 0 0 12px #00ff9d22,var(--glow); }
  select.input option { background:#071218; }
  .label {
    display:block; font-size:10px; color:var(--accent); font-weight:700;
    text-transform:uppercase; letter-spacing:.14em; margin-bottom:5px;
    font-family:'Courier New',monospace;
  }

  /* ── Section label ── */
  .section-label {
    font-size:10px; font-weight:700; color:var(--accent);
    text-transform:uppercase; letter-spacing:.16em;
    margin-bottom:10px; font-family:'Courier New',monospace;
  }

  /* ── Grid helpers ── */
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .flex-row { display:flex; gap:8px; }
  .flex-between { display:flex; justify-content:space-between; align-items:center; }

  /* ── Progress bar ── */
  .progress-wrap { height:4px; background:#0e2a38; border:1px solid #00ff9d33; overflow:hidden; }
  .progress-fill { height:100%; transition:width .4s; }

  /* ── Toggle switch ── */
  .toggle-track {
    width:46px; height:26px; border-radius:13px; border:none;
    cursor:pointer; position:relative; transition:all .2s; flex-shrink:0;
  }
  .toggle-thumb {
    width:20px; height:20px; border-radius:10px; background:#fff;
    position:absolute; top:3px; transition:left .2s;
    box-shadow:0 1px 4px #0004;
  }

  /* ── Player card ── */
  .player-card { border:1px solid #00ff9d33; border-radius:4px; margin-bottom:10px; overflow:hidden; box-shadow:0 0 12px #00ff9d08; background:linear-gradient(135deg,#091a28,#060f18); }
  .player-card-header { display:flex; align-items:center; gap:13px; padding:13px 15px; cursor:pointer; }
  .player-card-header:hover { background:#00ff9d08; }
  .player-detail { padding:0 15px 16px; border-top:1px solid #00ff9d33; display:none; }
  .player-detail.open { display:block; }
  .info-row { display:flex; justify-content:space-between; align-items:center; padding:9px 0; border-bottom:1px solid #00ff9d18; }
  .info-row .info-label { font-size:12px; color:var(--muted); font-weight:600; }
  .info-row .info-value { font-size:13px; color:var(--text); font-weight:600; text-align:right; max-width:60%; }

  /* ── Avatar ── */
  .avatar {
    width:40px; height:40px; border-radius:4px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-weight:900; font-size:15px; font-family:'Courier New',monospace;
  }

  /* ── Toggle buttons (team/gender) ── */
  .toggle-btn {
    flex:1; padding:9px; border-radius:2px;
    font-family:'Courier New',monospace; font-size:11px; font-weight:700;
    letter-spacing:.1em; text-transform:uppercase; cursor:pointer;
    transition:all .2s; background:transparent; color:var(--muted);
    border:1px solid #0e3a5288;
  }
  .toggle-btn.active-cyan { border-color:var(--accent); color:var(--accent); background:#00ff9d22; box-shadow:var(--glow); }
  .toggle-btn.active-green { border-color:var(--accentB); color:var(--accentB); background:#00ff9d22; box-shadow:var(--glowG); }

  /* ── Match row ── */
  .match-row {
    display:flex; align-items:center; justify-content:space-between;
    background:var(--bg); border:1px solid var(--border); border-radius:4px;
    padding:13px 14px; margin-bottom:8px;
  }

  /* ── Ratio rating display ── */
  .ratio-display {
    font-size:22px; font-weight:900; color:var(--accent);
    letter-spacing:3px; font-family:'Courier New',monospace;
    text-shadow:var(--glow);
  }
  .ratio-input {
    width:52px; text-align:center; padding:8px 6px;
    font-size:16px; font-weight:700;
  }
  .ratio-colon {
    font-size:22px; font-weight:900; color:var(--accent);
    font-family:'Courier New',monospace; text-shadow:var(--glow);
  }

  /* ── Form card ── */
  .form-card {
    background:linear-gradient(135deg,#091a28,#060f18);
    border:1px solid #00ff9d66; border-radius:4px;
    padding:18px; margin-bottom:20px;
  }
  .form-title { font-size:12px; font-weight:700; color:var(--accent); text-transform:uppercase; letter-spacing:.08em; margin-bottom:16px; }

  /* ── Warn strip ── */
  .warn-strip {
    background:#ff2d5512; border:1px solid #ff2d5540; border-radius:4px;
    padding:10px 14px; margin-bottom:16px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .warn-text { font-size:13px; color:#ff2d55; font-weight:700; letter-spacing:.06em; }

  /* ── Chevron ── */
  .chevron { transition:transform .2s; }
  .chevron.open { transform:rotate(180deg); }

  /* ── Empty state ── */
  .empty { text-align:center; color:var(--muted); font-size:13px; padding:40px 0; }

  /* ── Poll voter chip ── */
  .voter-row {
    display:flex; align-items:center; justify-content:space-between;
    background:#071218; border:1px solid #00ff9d18; border-radius:3px;
    padding:9px 12px; margin-bottom:6px;
  }
  .squad-chip {
    padding:4px 10px; border-radius:2px; cursor:pointer;
    font-family:'Courier New',monospace; font-size:11px; font-weight:700;
    letter-spacing:.05em; transition:all .15s; background:transparent;
    border:1px solid #0e3a5244; color:var(--muted);
  }
  .squad-chip.voted { border-color:var(--accent); color:var(--accent); background:#00ff9d22; }

  /* ── Profile hero ── */
  .profile-hero {
    background:linear-gradient(135deg,#091a28,#060f18);
    border:1px solid #00ff9d55; border-radius:4px;
    padding:28px 22px; text-align:center; margin-bottom:16px;
  }
  .profile-avatar {
    width:72px; height:72px; border-radius:4px; margin:0 auto 16px;
    background:#00ff9d22; border:2px solid var(--accent);
    box-shadow:var(--glow);
    display:flex; align-items:center; justify-content:center;
    font-size:22px; font-weight:900; color:var(--accent);
    font-family:'Courier New',monospace;
  }
  .profile-name { font-size:20px; font-weight:900; letter-spacing:.06em; text-transform:uppercase; text-shadow:0 0 16px #00ff9d44; }
  .profile-role { color:var(--accentB); font-weight:700; font-size:12px; margin-top:4px; letter-spacing:.12em; text-transform:uppercase; }
  .profile-club { color:var(--muted); font-size:13px; margin-top:2px; }
  .profile-bio { color:var(--muted); font-size:12px; margin:12px auto 0; max-width:320px; line-height:1.6; }
  .profile-email { color:var(--muted); font-size:12px; margin-top:6px; }
  .stat-box {
    background:#071218; border-radius:3px; padding:14px 10px; text-align:center;
  }
  .stat-num { font-size:28px; font-weight:900; }
  .stat-lbl { font-size:11px; color:var(--muted); margin-top:3px; }
  .info-box { background:#071218; border-radius:3px; padding:10px 12px; border:1px solid #00ff9d22; }
  .info-box-key { font-size:10px; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:.06em; }
  .info-box-val { font-size:13px; color:var(--text); font-weight:600; margin-top:3px; }

  /* ── Animations ── */
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .page-content > * { animation:fadeIn .25s ease; }

  /* ── Hidden ── */
  .hidden { display:none !important; }
</style>
</head>
<body>

<!-- Top bar -->
<div id="topbar">
  <div class="logo">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
      <path d="M15 5 L19 9 L9 19 L5 19 Z" fill="#00ff9d"/>
      <line x1="5" y1="19" x2="15" y2="5" stroke="#00ff9d" stroke-width="2" stroke-linecap="round"/>
      <circle cx="4" cy="20" r="1.5" fill="#00ff9d"/>
    </svg>
  </div>
  <div>
    <div class="club-name" id="header-club">Athlone CC</div>
    <div class="sys-line" id="header-sys">SYS:2025/26 ▸ PLAYERS</div>
  </div>
  <div class="status-dot"></div>
</div>

<!-- Page -->
<div id="page">
  <div id="tab-Players"  class="page-content"></div>
  <div id="tab-Ratings"  class="page-content hidden"></div>
  <div id="tab-Fixtures" class="page-content hidden"></div>
  <div id="tab-Practice" class="page-content hidden"></div>
  <div id="tab-Kit"      class="page-content hidden"></div>
  <div id="tab-Scoring"  class="page-content hidden"></div>
  <div id="tab-Profile"  class="page-content hidden"></div>
</div>

<!-- Bottom nav -->
<nav id="nav">
  <button class="nav-btn active" data-tab="Players" onclick="switchTab('Players')">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/><path d="M21 21v-2a4 4 0 0 0-3-3.85"/></svg>
    Players
  </button>
  <button class="nav-btn" data-tab="Ratings" onclick="switchTab('Ratings')">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    Ratings
  </button>
  <button class="nav-btn" data-tab="Fixtures" onclick="switchTab('Fixtures')">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Fixtures
  </button>
  <button class="nav-btn" data-tab="Practice" onclick="switchTab('Practice')">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="8" y1="12" x2="8" y2="16"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="16" y1="10" x2="16" y2="16"/></svg>
    Practice
  </button>
  <button class="nav-btn" data-tab="Kit" onclick="switchTab('Kit')">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
    Kit
  </button>
  <button class="nav-btn" data-tab="Scoring" onclick="switchTab('Scoring')">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    Score
  </button>
  <button class="nav-btn" data-tab="Profile" onclick="switchTab('Profile')">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
    Profile
  </button>
</nav>

<script>
// ── Data ──────────────────────────────────────────────────────────────────
const ROLES = ["Batsman","Bowler","All-rounder","Wicket-keeper","Opening Batsman"];
const BATTER_TYPES = ["Right-hand","Left-hand"];
const BOWLER_TYPES = ["None","Pace – Fast","Pace – Medium Fast","Pace – Medium","Pace – Left-arm Fast","Pace – Left-arm Medium Fast","Pace – Left-arm Medium","Spin – Off-spin","Spin – Leg-spin","Spin – Left-arm orthodox","Spin – Left-arm wrist","Pace & Spin – Fast & Off-spin","Pace & Spin – Fast & Leg-spin","Pace & Spin – Medium & Off-spin","Pace & Spin – Medium & Leg-spin","Pace & Spin – Left-arm Fast & Left-arm orthodox","Pace & Spin – Left-arm Fast & Left-arm wrist","Pace & Spin – Left-arm Medium & Left-arm orthodox","Pace & Spin – Left-arm Medium & Left-arm wrist"];
const STATUS_COLORS = { Available:"#00ff9d", Injured:"#ff6b35", Suspended:"#ff2d55" };
const AVATAR_COLORS = ["#00ff9d","#00ff9d","#bf3aff","#ff6b35","#ff2d55","#ffe500"];
const FORMATS = ["T20","40-over","50-over","Test","Friendly"];
const COMPETITIONS = ["League","Cup","Friendly","Knockout"];
const CONDITIONS = ["Excellent","Good","Fair","Poor"];
const TEAMS = ["Team 1","Team 2","Team 3","Team 1-W"];

let players = [];
let matches = [];
let equipment = [
  { id:1, item:"Cricket Bat (Match)",     total:15, distributed:11, condition:"Good"      },
  { id:2, item:"Batting Helmet",          total:12, distributed:10, condition:"Good"      },
  { id:3, item:"Batting Gloves (pair)",   total:20, distributed:16, condition:"Fair"      },
  { id:4, item:"Batting Pads (pair)",     total:14, distributed:12, condition:"Good"      },
  { id:5, item:"Cricket Ball (Match)",    total:30, distributed:14, condition:"Excellent" },
  { id:6, item:"Cricket Ball (Training)", total:60, distributed:45, condition:"Fair"      },
  { id:7, item:"Wicket-keeper Gloves",    total:4,  distributed:2,  condition:"Good"      },
  { id:8, item:"Club Playing Kit",        total:18, distributed:15, condition:"Excellent" },
];
let ratings = {};
let polls = [];
let profile = { name:"", role:"", club:"Athlone CC", season:"", bio:"", founded:"1975", ground:"Doon Cricket Ground" };

let activeTab = "Players";
let playerTeamTab = "Mens";
let playerSearch = "";
let selectingForMatch = null; // match id when in selection mode
let matchPlayers = {}; // matchId -> [playerId, ...]
let playerMode = null; // null | "add" | player-id
let openCards = new Set();
let showAddFixture = false;
let fixtureTeamTab = "Team 1";
let showAddEquip = false;
let showCreatePoll = false;

// ── Utils ─────────────────────────────────────────────────────────────────
function pill(color, text) {
  return `<span class="pill" style="background:${color}22;color:${color};border:1px solid ${color}66">${text}</span>`;
}
function avatar(num, idx) {
  const c = AVATAR_COLORS[idx % AVATAR_COLORS.length];
  return `<div class="avatar" style="background:${c}22;border:1px solid ${c};color:${c};box-shadow:0 0 10px ${c}44">${num}</div>`;
}
function progressBar(pct, color) {
  return `<div class="progress-wrap"><div class="progress-fill" style="width:${Math.min(100,pct)}%;background:linear-gradient(90deg,${color}99,${color});box-shadow:0 0 8px ${color}"></div></div>`;
}
function ratioDisplay(r) {
  if (!r || (r.a === "" && r.b === "")) return `<span class="ratio-display">—</span>`;
  return `<span class="ratio-display">${r.a}:${r.b}</span>`;
}
function formatDate(d) {
  if (!d) return "";
  try { return new Date(d).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"}); }
  catch(e) { return d; }
}
function formatDateShort(d) {
  if (!d) return "";
  try { return new Date(d).toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"}); }
  catch(e) { return d; }
}
function isWin(r) { return r && (r.startsWith("W") || r.toLowerCase().startsWith("won")); }
function isLoss(r) { return r && (r.startsWith("L") || r.toLowerCase().startsWith("lost")); }
function resultColor(r) { return isWin(r) ? "#00ff9d" : isLoss(r) ? "#ff2d55" : "#f5c542"; }
function condColor(c) { return c==="Excellent"?"#00ff9d":c==="Good"?"#00ff9d":c==="Fair"?"#ff6b35":"#ff2d55"; }
function pageHeader(title, sub, actionHtml="") {
  return `<div class="page-header">
    <div class="header-row">
      <div>
        <div class="sys-tag">// SYSTEM MODULE</div>
        <h1>${title}</h1>
        ${sub ? `<div class="sub">${sub}</div>` : ""}
      </div>
      ${actionHtml}
    </div>
    <div class="divider"></div>
  </div>`;
}
function sectionLabel(text, style="") {
  return `<div class="section-label" style="${style}">// ${text}</div>`;
}
function selectOpts(arr, val) {
  return arr.map(o => `<option${o===val?" selected":""}>${o}</option>`).join("");
}
function card(inner, extraStyle="") {
  return `<div class="card" style="${extraStyle}">${inner}</div>`;
}

// ── Tab switching ─────────────────────────────────────────────────────────
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.page-content').forEach(el => el.classList.add('hidden'));
  document.getElementById(`tab-${tab}`).classList.remove('hidden');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
  const sysEl = document.getElementById('header-sys'); if(sysEl) sysEl.textContent = `SYS:${profile.season||''} ▸ ${tab.toUpperCase()}`;
  render();
}
function render() { window[`render${activeTab}`](); }
function renderScoring_wrapper() { renderScoring(); }

// ── PLAYERS ───────────────────────────────────────────────────────────────
function renderPlayers() {
  // Remember focus state before re-rendering
  const searchFocused = document.activeElement && document.activeElement.id === 'player-search-input';
  const cursorPos = searchFocused ? document.activeElement.selectionStart : null;
  const query = playerSearch.toLowerCase().trim();
  const teamFiltered = players.filter(p => (p.team || "Mens") === playerTeamTab);
  const visible = query
    ? teamFiltered.filter(p => p.name.toLowerCase().includes(query) || p.role.toLowerCase().includes(query))
    : teamFiltered;
  const unpaid = teamFiltered.filter(p => !p.feesPaid).length;

  // Selection mode
  const match = selectingForMatch ? matches.find(m => m.id === selectingForMatch) : null;
  let html = "";
  if (match) {
    const selected = matchPlayers[match.id] || [];
    html += `<div style="background:#00ff9d18;border:1px solid #00ff9d55;border-radius:4px;padding:14px 16px;margin-bottom:18px">
      <div style="font-size:10px;color:var(--accent);font-family:'Courier New',monospace;letter-spacing:.14em;text-transform:uppercase;margin-bottom:4px">// Selecting players for</div>
      <div style="font-weight:800;font-size:15px;color:var(--text)">vs ${match.opponent}</div>
      <div style="font-size:12px;color:var(--muted);margin-top:2px">${formatDate(match.date)} · ${match.team || ""}</div>
      <div style="font-size:12px;color:var(--accent);margin-top:6px">${selected.length} player${selected.length!==1?"s":""} selected — tap a player to toggle</div>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="btn btn-primary btn-small" onclick="doneSelectingPlayers()">✓ Done</button>
        <button class="btn btn-ghost btn-small" onclick="cancelSelectingPlayers()">Cancel</button>
      </div>
    </div>`;
  } else {
    html += pageHeader("Squad", `${teamFiltered.length} players · ${unpaid} fee${unpaid!==1?"s":""} outstanding`,
      `<button class="btn btn-primary" onclick="togglePlayerMode('add')">+ Add</button>`);
  }

  // Team tabs
  html += `<div class="flex-row" style="margin-bottom:12px">`;
  ["Mens","Womens"].forEach(t => {
    html += `<button class="toggle-btn${t===playerTeamTab?" active-cyan":""}" onclick="setPlayerTeamTab('${t}')">${t}</button>`;
  });
  html += `</div>`;

  // Search bar
  html += `<div style="position:relative;margin-bottom:16px">
    <input class="input" id="player-search-input" placeholder="Search by name or role…" value="${playerSearch.replace(/"/g,'&quot;')}"
      oninput="playerSearch=this.value;renderPlayers()" style="padding-left:36px">
    <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none">⌕</span>
    ${playerSearch ? `<button onclick="playerSearch='';renderPlayers()" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:14px">✕</button>` : ""}
  </div>`;

  // Warning
  if (unpaid > 0) html += `<div class="warn-strip"><span class="warn-text">⚠ ${unpaid} player${unpaid!==1?"s":""} yet to pay fees</span></div>`;

  // Add form
  if (playerMode === "add") {
    html += `<div class="form-card">${playerForm(null, false)}</div>`;
  }

  // Edit form
  if (playerMode && playerMode !== "add") {
    const p = players.find(x => x.id === playerMode);
    if (p) html += `<div class="form-card" style="border-color:#00ff9d66">${playerForm(p, true)}</div>`;
  }

  // Player list
  if (visible.length === 0 && !playerMode) {
    html += query
      ? `<div class="empty">No players match "<strong>${playerSearch}</strong>".</div>`
      : `<div class="empty">No ${playerTeamTab} players yet. Tap <strong>Add</strong> to register one.</div>`;
  }

  visible.forEach((p, i) => {
    const isOpen = openCards.has(p.id);
    const c = AVATAR_COLORS[i % AVATAR_COLORS.length];
    const r = ratings[p.id] || {a:"",b:""};
    const isSelected = selectingForMatch && (matchPlayers[selectingForMatch]||[]).includes(p.id);
    const cardBorder = isSelected ? "#00ff9d88" : "#00ff9d22";
    const cardBg = isSelected ? "linear-gradient(135deg,#00ff9d18,#060f18)" : "linear-gradient(135deg,#091a28,#060f18)";
    const clickAction = selectingForMatch ? `togglePlayerForMatch(${p.id})` : `toggleCard(${p.id})`;
    html += `<div class="player-card" style="border-color:${cardBorder};background:${cardBg}">
      <div class="player-card-header" onclick="${clickAction}">
        ${isSelected ? `<div style="position:absolute;top:6px;right:8px;font-size:11px;color:#00ff9d;font-family:'Courier New',monospace;font-weight:900">✓</div>` : ""}
        <div style="flex-shrink:0;width:40px;height:40px">
          <div class="avatar" style="background:${c}22;border:1px solid ${c};color:${c};box-shadow:0 0 10px ${c}44;width:40px;height:40px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:15px;font-family:'Courier New',monospace">${p.number}</div>
        </div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:8px">
            <div style="font-weight:700;font-size:14px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.name}</div>
            <button onclick="event.stopPropagation();deletePlayer(${p.id})"
              style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:13px;padding:2px 5px;border-radius:4px;transition:color .2s;flex-shrink:0;line-height:1"
              onmouseover="this.style.color='#ff2d55'" onmouseout="this.style.color='var(--muted)'">✕</button>
          </div>
          <div style="font-size:12px;color:var(--muted)">${p.role}</div>
        </div>
        ${pill(STATUS_COLORS[p.status] || "#00ff9d", p.status)}
        <svg class="chevron${isOpen?" open":""}" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2.5" style="margin-left:4px"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="player-detail${isOpen?" open":""}">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)">
          <span style="font-size:12px;color:var(--muted);font-weight:600">Rating</span>
          ${ratioDisplay(r)}
        </div>
        ${infoRow("Full Name", p.name)}
        ${infoRow("Jersey #", "#" + p.number)}
        ${infoRow("Team", p.team || "Mens")}
        ${infoRow("Gender", p.gender || "—")}
        ${infoRow("Role", p.role)}
        ${infoRow("Type of Batter", p.batterType || "—")}
        ${infoRow("Type of Bowler", p.bowlerType === "None" ? "—" : p.bowlerType)}
        ${infoRow("Car Plate", p.carPlate || "—")}
        <div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #00ff9d18">
          <span style="font-size:12px;color:var(--muted);font-weight:600">Fees Paid</span>
          ${pill(p.feesPaid ? "#00ff9d" : "#ff2d55", p.feesPaid ? "Paid ✓" : "Unpaid")}
        </div>
        <div style="display:flex;gap:8px;margin-top:14px">
          <button class="btn btn-primary btn-small" onclick="editPlayer(${p.id})">✎ Edit</button>
        </div>
      </div>
    </div>`;
  });

  document.getElementById("tab-Players").innerHTML = html;

  // Restore focus and cursor position to search input if it was focused
  if (searchFocused) {
    const input = document.getElementById('player-search-input');
    if (input) {
      input.focus();
      if (cursorPos !== null) input.setSelectionRange(cursorPos, cursorPos);
    }
  }
}

function infoRow(label, value) {
  return `<div class="info-row"><span class="info-label">${label}</span><span class="info-value">${value}</span></div>`;
}

function playerForm(p, isEdit) {
  const d = p || { name:"", number:"", role:"Batsman", status:"Available", batterType:"Right-hand", bowlerType:"None", carPlate:"", feesPaid:false, team:playerTeamTab, gender:"Male" };
  const r = isEdit && p ? (ratings[p.id] || {a:"",b:""}) : {a:"",b:""};
  return `
    <div class="form-title">${isEdit ? "Edit Player" : "New Player"}</div>
    <div style="margin-bottom:10px">
      <label class="label">Full Name</label>
      <input class="input" id="pf-name" placeholder="Player name" value="${d.name}">
    </div>
    <div style="margin-bottom:10px">
      <label class="label">Team</label>
      <div class="flex-row">
        ${["Mens","Womens"].map(t => `<button class="toggle-btn${d.team===t?" active-cyan":""}" onclick="pfSetTeam(this,'${t}')">${t}</button>`).join("")}
      </div>
    </div>
    <div style="margin-bottom:10px">
      <label class="label">Gender</label>
      <div class="flex-row">
        ${["Male","Female"].map(g => `<button class="toggle-btn${d.gender===g?" active-green":""}" onclick="pfSetGender(this,'${g}')">${g}</button>`).join("")}
      </div>
    </div>
    <div class="grid2" style="margin-bottom:10px">
      <div><label class="label">Jersey #</label><input class="input" id="pf-number" type="number" placeholder="#" value="${d.number}"></div>
      <div><label class="label">Role</label><select class="input" id="pf-role">${selectOpts(ROLES, d.role)}</select></div>
    </div>
    <div class="grid2" style="margin-bottom:10px">
      <div><label class="label">Type of Batter</label><select class="input" id="pf-batter">${selectOpts(BATTER_TYPES, d.batterType)}</select></div>
      <div><label class="label">Type of Bowler</label><select class="input" id="pf-bowler">${selectOpts(BOWLER_TYPES, d.bowlerType)}</select></div>
    </div>
    <div class="grid2" style="margin-bottom:10px">
      <div><label class="label">Status</label><select class="input" id="pf-status">${selectOpts(Object.keys(STATUS_COLORS), d.status)}</select></div>
      <div><label class="label">Car Plate No.</label><input class="input" id="pf-plate" placeholder="e.g. ABC 123" value="${d.carPlate}"></div>
    </div>
    ${isEdit ? `<div style="margin-bottom:14px">
      <label class="label">Rating</label>
      <div style="display:flex;align-items:center;gap:6px">
        <input class="input ratio-input" id="pf-ra" type="number" min="0" max="99" value="${r.a}">
        <span class="ratio-colon">:</span>
        <input class="input ratio-input" id="pf-rb" type="number" min="0" max="99" value="${r.b}">
      </div>
    </div>` : ""}
    <div style="display:flex;align-items:center;justify-content:space-between;background:#071218;border:1px solid #00ff9d33;border-radius:4px;padding:12px 14px;margin-bottom:18px">
      <div>
        <div style="font-size:13px;font-weight:700;color:var(--text)">Fees Paid</div>
        <div style="font-size:11px;color:var(--muted)">Club membership fee</div>
      </div>
      <button class="toggle-track" id="pf-fees-btn" onclick="pfToggleFees(this)"
        style="background:${d.feesPaid?"var(--accent)":"#0e2a38"};border:1px solid ${d.feesPaid?"var(--accent)":"var(--border)"};box-shadow:${d.feesPaid?"var(--glow)":"none"}"
        data-fees="${d.feesPaid}">
        <div class="toggle-thumb" style="left:${d.feesPaid?23:3}px"></div>
      </button>
    </div>
    <div class="flex-row">
      <button class="btn btn-primary" onclick="savePlayer(${isEdit ? p.id : "null"})">${isEdit ? "Save Changes" : "Add to Squad"}</button>
      <button class="btn btn-ghost" onclick="cancelPlayer()">Cancel</button>
    </div>`;
}

function pfSetTeam(btn, team) {
  btn.closest('.flex-row').querySelectorAll('.toggle-btn').forEach(b => b.className = 'toggle-btn');
  btn.className = 'toggle-btn active-cyan';
}
function pfSetGender(btn, gender) {
  btn.closest('.flex-row').querySelectorAll('.toggle-btn').forEach(b => b.className = 'toggle-btn');
  btn.className = 'toggle-btn active-green';
}
function pfToggleFees(btn) {
  const fees = btn.dataset.fees === "true";
  btn.dataset.fees = !fees;
  btn.style.background = !fees ? "var(--accent)" : "#0e2a38";
  btn.style.border = `1px solid ${!fees ? "var(--accent)" : "var(--border)"}`;
  btn.style.boxShadow = !fees ? "var(--glow)" : "none";
  btn.querySelector('.toggle-thumb').style.left = (!fees ? 23 : 3) + "px";
}
function toggleCard(id) {
  if (openCards.has(id)) openCards.delete(id); else openCards.add(id);
  renderPlayers();
}
function openPlayerSelection(matchId) {
  selectingForMatch = matchId;
  playerMode = null;
  switchTab('Players');
}
function togglePlayerForMatch(playerId) {
  if (!selectingForMatch) return;
  if (!matchPlayers[selectingForMatch]) matchPlayers[selectingForMatch] = [];
  const idx = matchPlayers[selectingForMatch].indexOf(playerId);
  if (idx > -1) matchPlayers[selectingForMatch].splice(idx, 1);
  else matchPlayers[selectingForMatch].push(playerId);
  renderPlayers();
}
function doneSelectingPlayers() {
  selectingForMatch = null;
  switchTab('Fixtures');
}
function cancelSelectingPlayers() {
  selectingForMatch = null;
  renderPlayers();
}
function setPlayerTeamTab(t) { playerTeamTab = t; playerSearch = ""; playerMode = null; renderPlayers(); }
function togglePlayerMode(m) { playerMode = playerMode === m ? null : m; renderPlayers(); }
function editPlayer(id) { playerMode = id; openCards.delete(id); renderPlayers(); }
function cancelPlayer() { playerMode = null; renderPlayers(); }
function deletePlayer(id) { players = players.filter(p => p.id !== id); openCards.delete(id); renderPlayers(); }

function savePlayer(editId) {
  const name = document.getElementById('pf-name')?.value?.trim();
  const number = document.getElementById('pf-number')?.value;
  if (!name || !number) return;
  const teamBtn = document.querySelector('#tab-Players .form-card .active-cyan');
  const genderBtn = document.querySelector('#tab-Players .form-card .active-green');
  const team = teamBtn ? teamBtn.textContent.trim() : playerTeamTab;
  const gender = genderBtn ? genderBtn.textContent.trim() : "Male";
  const feesPaid = document.getElementById('pf-fees-btn')?.dataset.fees === "true";
  const data = {
    name, number:+number,
    role: document.getElementById('pf-role')?.value,
    batterType: document.getElementById('pf-batter')?.value,
    bowlerType: document.getElementById('pf-bowler')?.value,
    status: document.getElementById('pf-status')?.value,
    carPlate: document.getElementById('pf-plate')?.value || "",
    team, gender, feesPaid,
  };
  if (editId) {
    const ra = document.getElementById('pf-ra')?.value;
    const rb = document.getElementById('pf-rb')?.value;
    if (ra !== "" && ra !== undefined) ratings[editId] = { a:+ra, b:+rb||0 };
    players = players.map(p => p.id === editId ? { ...p, ...data } : p);
  } else {
    const id = Date.now();
    players.push({ ...data, id });
    ratings[id] = {a:"",b:""};
  }
  playerMode = null;
  renderPlayers();
}

// ── RATINGS ───────────────────────────────────────────────────────────────
// ── RATINGS ───────────────────────────────────────────────────────────────
const RATING_CATS = ["1:1","1:2","2:1","2:2"];
// playerCategory[playerId] = "1:1" | "1:2" | "2:1" | "2:2" | null
let playerCategory = {};

function renderRatings() {
  let html = pageHeader("Ratings", "Assign players to a rating category");

  // Unassigned players
  const unassigned = players.filter(p => !playerCategory[p.id]);

  if (unassigned.length > 0) {
    html += `<div style="margin-bottom:20px">
      <div class="section-label">// Unassigned</div>`;
    unassigned.forEach((p, i) => {
      const c = AVATAR_COLORS[players.indexOf(p) % AVATAR_COLORS.length];
      html += `<div style="display:flex;align-items:center;gap:12px;background:linear-gradient(135deg,#091a28,#060f18);border:1px solid #00ff9d22;border-radius:4px;padding:12px 14px;margin-bottom:8px">
        <div style="width:36px;height:36px;border-radius:4px;flex-shrink:0;background:${c}22;border:1px solid ${c};color:${c};display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;font-family:'Courier New',monospace">${p.number}</div>
        <div style="flex:1">
          <div style="font-weight:700;color:var(--text);font-size:13px">${p.name}</div>
          <div style="font-size:11px;color:var(--muted)">${p.role}</div>
        </div>
        <select onchange="assignCategory(${p.id},this.value)" style="background:#071218;border:1px solid #00ff9d44;border-radius:4px;padding:6px 10px;color:var(--muted);font-family:'Courier New',monospace;font-size:12px;outline:none;cursor:pointer">
          <option value="">Assign…</option>
          ${RATING_CATS.map(cat => `<option value="${cat}">${cat}</option>`).join("")}
        </select>
      </div>`;
    });
    html += `</div>`;
  }

  // Category sections
  RATING_CATS.forEach(cat => {
    const catPlayers = players.filter(p => playerCategory[p.id] === cat);
    const catColor = cat==="1:1"?"#00ff9d":cat==="1:2"?"#00ff9d":cat==="2:1"?"#bf3aff":"#ff6b35";
    html += `<div style="margin-bottom:20px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div style="font-size:18px;font-weight:900;color:${catColor};font-family:'Courier New',monospace;text-shadow:0 0 12px ${catColor}66;letter-spacing:2px">${cat}</div>
        <div style="font-size:11px;color:var(--muted);font-family:'Courier New',monospace">${catPlayers.length} player${catPlayers.length!==1?"s":""}</div>
      </div>
      <div style="border-left:2px solid ${catColor}44;padding-left:12px;min-height:40px">`;

    if (catPlayers.length === 0) {
      html += `<div style="font-size:12px;color:var(--muted);padding:10px 0;font-style:italic">No players assigned yet</div>`;
    } else {
      catPlayers.forEach(p => {
        const c = AVATAR_COLORS[players.indexOf(p) % AVATAR_COLORS.length];
        html += `<div style="display:flex;align-items:center;gap:12px;background:linear-gradient(135deg,#091a28,#060f18);border:1px solid ${catColor}33;border-radius:4px;padding:11px 13px;margin-bottom:8px">
          <div style="width:36px;height:36px;border-radius:4px;flex-shrink:0;background:${c}22;border:1px solid ${c};color:${c};display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;font-family:'Courier New',monospace">${p.number}</div>
          <div style="flex:1">
            <div style="font-weight:700;color:var(--text);font-size:13px">${p.name}</div>
            <div style="font-size:11px;color:var(--muted)">${p.role}</div>
          </div>
          <select onchange="assignCategory(${p.id},this.value)" style="background:#071218;border:1px solid ${catColor}44;border-radius:4px;padding:6px 10px;color:${catColor};font-family:'Courier New',monospace;font-size:12px;outline:none;cursor:pointer">
            ${RATING_CATS.map(c2 => `<option value="${c2}"${c2===cat?" selected":""}>${c2}</option>`).join("")}
            <option value="">Remove</option>
          </select>
        </div>`;
      });
    }
    html += `</div></div>`;
  });

  document.getElementById("tab-Ratings").innerHTML = html;
}

function assignCategory(playerId, cat) {
  if (!cat) {
    delete playerCategory[playerId];
  } else {
    playerCategory[playerId] = cat;
  }
  renderRatings();
}

function setRating(id, key, val) {
  if (!ratings[id]) ratings[id] = {a:"",b:""};
  ratings[id][key] = val === "" ? "" : +val;
}

// ── FIXTURES ──────────────────────────────────────────────────────────────
function renderFixtures() {
  const allVisible = matches.filter(m => {
    if (fixtureTeamTab === "Friendlies") return m.team === "Friendly";
    if (fixtureTeamTab === "Friendlies-W") return m.team === "Friendly-W";
    return (m.team || "Team 1") === fixtureTeamTab;
  });
  const upcoming = allVisible.filter(m=>!m.result).sort((a,b)=>a.date.localeCompare(b.date));
  const past = allVisible.filter(m=>m.result).sort((a,b)=>b.date.localeCompare(a.date));
  let html = pageHeader("Fixtures", `${upcoming.length} upcoming · ${past.length} played`,
    `<button class="btn btn-primary" onclick="toggleAddFixture()">+ Add</button>`);

  // Team tabs
  html += `<div style="display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap">`;
  ["Team 1","Team 2","Team 3","Team 1-W","Friendlies","Friendlies-W"].forEach(t => {
    const active = t === fixtureTeamTab;
    html += `<button onclick="setFixtureTeamTab('${t}')" style="padding:8px 14px;border-radius:2px;border:1px solid ${active?"var(--accent)":"#0a3d2a88"};background:${active?"#00ff9d22":"transparent"};color:${active?"var(--accent)":"var(--muted)"};font-family:'Courier New',monospace;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .2s;box-shadow:${active?"var(--glow)":"none"};white-space:nowrap">${t}</button>`;
  });
  html += `</div>`;

  if (showAddFixture) {
    html += `<div class="form-card">
      <div class="form-title">New Fixture</div>
      <div style="margin-bottom:10px"><label class="label">Opponent Club</label><input class="input" id="fx-opp" placeholder="e.g. Thornfield CC"></div>
      <div style="margin-bottom:10px">
        <label class="label">Competition</label>
        <select class="input" id="fx-comp" onchange="toggleFxTeamField(this.value)">${selectOpts(COMPETITIONS,"League")}</select>
      </div>
      <div id="fx-team-row" style="margin-bottom:10px">
        <label class="label">Team</label>

function fxSetTeam(btn, team) {

function matchRow(m) {

      <div style="font-size:11px;color:var(--muted);font-family:'Courier New',monospace">
        ${squad.length > 0 ? `${squad.length} player${squad.length!==1?"s":""} selected` : "No players selected"}

    ${squad.length > 0 ? `

function deleteFixture(id) { matches = matches.filter(m => m.id !== id); renderFixtures(); }
function removeMatchPlayer(matchId, playerId) {
  if (matchPlayers[matchId]) {
    matchPlayers[matchId] = matchPlayers[matchId].filter(id => id !== playerId);

}
function toggleAddFixture() { showAddFixture = !showAddFixture; renderFixtures(); }
function setFriendlyType(btn, type) {
  document.getElementById('fx-friendly-mens').className = 'toggle-btn' + (type==='mens'?' active-cyan':'');

function addFixture() {
  const opp = document.getElementById('fx-opp')?.value?.trim();
  const date = document.getElementById('fx-date')?.value;

  const comp = document.getElementById('fx-comp')?.value || "League";

function toggleCreatePoll() { showCreatePoll = !showCreatePoll; renderPractice(); }
function createPoll() {
  const title = document.getElementById('po-title')?.value?.trim();
  const date = document.getElementById('po-date')?.value;
  if (!title || !date) return;
  const proposer = profile.name && profile.name.trim() ? profile.name.trim() : null;
  polls.push({ id:Date.now(), title, date, time:document.getElementById('po-time')?.value||"", location:document.getElementById('po-loc')?.value||"", votes:[], open:true, proposer });
  showCreatePoll = false; renderPractice();
}
function castVote(pollId) {
  const input = document.getElementById(`voter-${pollId}`);
  const name = input?.value?.trim();
  if (!name) return;
  const poll = polls.find(p=>p.id===pollId);
  if (poll && !poll.votes.includes(name)) poll.votes.push(name);
  if (input) input.value = "";
  renderPractice();
}
function toggleVote(pollId, name) {
  const poll = polls.find(p=>p.id===pollId);
  if (!poll) return;
  if (poll.votes.includes(name)) poll.votes = poll.votes.filter(v=>v!==name);
  else poll.votes.push(name);
  renderPractice();
}
function removeVote(pollId, name) {
  const poll = polls.find(p=>p.id===pollId);
  if (poll) poll.votes = poll.votes.filter(v=>v!==name);
  renderPractice();
}
function closePoll(id) { const p=polls.find(x=>x.id===id); if(p) p.open=false; renderPractice(); }
function deletePoll(id) { polls=polls.filter(p=>p.id!==id); renderPractice(); }

function addEquip() {

function updateEquip(id, field, val) {

function deleteEquip(id) {

}

// ── SCORING ───────────────────────────────────────────────────────────────
let scoring = {
  active: false,
  matchName: "",
  battingTeam: "Athlone CC",
  fieldingTeam: "",
  totalOvers: 20,
  matchType: "League",
  tossWinner: "",
  tossDecision: "bat",
  innings: 1,
  runs: 0,
  wickets: 0,
  balls: 0,          // legal balls this over
  totalBalls: 0,
  extras: { wides:0, noBalls:0, byes:0, legByes:0 },
  striker: "",
  nonStriker: "",
  bowler: "",
  batsmen: {},       // name -> { runs, balls, fours, sixes, out:bool }
  bowlers: {},       // name -> { overs, balls, runs, wickets, wides, noBalls }
  ballLog: [],       // array of ball events
  target: null,
  innings1: null,    // saved after first innings
};

function scoringBatsman(name) {
  if (!scoring.batsmen[name]) scoring.batsmen[name] = { runs:0, balls:0, fours:0, sixes:0, out:false };
  return scoring.batsmen[name];
}
function scoringBowler(name) {
  if (!scoring.bowlers[name]) scoring.bowlers[name] = { overs:0, balls:0, runs:0, wickets:0, wides:0, noBalls:0 };
  return scoring.bowlers[name];
}
function oversDisplay(b) { return `${Math.floor(b/6)}.${b%6}`; }
function runRate() {
  if (scoring.totalBalls === 0) return "0.00";
  return ((scoring.runs / scoring.totalBalls) * 6).toFixed(2);
}
function reqRunRate() {
  if (!scoring.target) return "—";
  const rem = scoring.target - scoring.runs;
  const ballsLeft = (scoring.totalOvers * 6) - scoring.totalBalls;
  if (ballsLeft <= 0) return "—";
  return ((rem / ballsLeft) * 6).toFixed(2);
}

function startScoring() {
  const bat   = document.getElementById('sc-bat')?.value?.trim();
  const field = document.getElementById('sc-field')?.value?.trim();
  const overs = +document.getElementById('sc-overs')?.value || 20;
  const str   = document.getElementById('sc-striker')?.value?.trim();
  const nstr  = document.getElementById('sc-nonstriker')?.value?.trim();
  const bowl  = document.getElementById('sc-bowler')?.value?.trim();
  const tossW = document.getElementById('sc-toss-winner')?.value?.trim() || "";
  const tossD = document.querySelector('.flex-row .active-cyan')?.textContent?.trim().toLowerCase() === "field" ? "field" : "bat";
  const matchType = document.getElementById('sc-match-type')?.value || "League";
  if (!bat || !field || !str || !nstr || !bowl) { alert("Please fill in all fields."); return; }
  scoring = { ...scoring, active:true, matchName:`${bat} vs ${field}`, battingTeam:bat, fieldingTeam:field, totalOvers:overs, innings:1, tossWinner:tossW, tossDecision:tossD, matchType, runs:0, wickets:0, balls:0, totalBalls:0, extras:{wides:0,noBalls:0,byes:0,legByes:0}, striker:str, nonStriker:nstr, bowler:bowl, batsmen:{}, bowlers:{}, ballLog:[], target:null };
  scoringBatsman(str); scoringBatsman(nstr); scoringBowler(bowl);
  renderScoring();
}

function addBall(runs) {
  const r = parseInt(runs);
  const bat = scoringBatsman(scoring.striker);
  const bowl = scoringBowler(scoring.bowler);
  bat.runs += r; bat.balls++;
  if (r === 4) bat.fours++;
  if (r === 6) bat.sixes++;
  scoring.runs += r;
  scoring.balls++;
  scoring.totalBalls++;
  bowl.runs += r; bowl.balls++;
  if (scoring.balls >= 6) bowl.overs++;
  scoring.ballLog.push(String(r));
  // Swap ends on odd runs
  if (r % 2 !== 0) { const tmp = scoring.striker; scoring.striker = scoring.nonStriker; scoring.nonStriker = tmp; }
  saveData(); renderScoring();
}

function addExtra(type) {
  if (type === "wide") {
    scoring.runs++; scoring.extras.wides++;
    scoringBowler(scoring.bowler).runs++; scoringBowler(scoring.bowler).wides++;
    scoring.ballLog.push("Wd");
  } else if (type === "noball") {
    scoring.runs++; scoring.extras.noBalls++;
    scoringBowler(scoring.bowler).runs++; scoringBowler(scoring.bowler).noBalls++;
    scoring.ballLog.push("Nb");
  } else if (type === "bye") {
    scoring.runs++; scoring.extras.byes++;
    scoring.balls++; scoring.totalBalls++;
    scoringBatsman(scoring.striker).balls++;
    scoring.ballLog.push("B");
  } else if (type === "legbye") {
    scoring.runs++; scoring.extras.legByes++;
    scoring.balls++; scoring.totalBalls++;
    scoringBatsman(scoring.striker).balls++;
    scoring.ballLog.push("Lb");
  }
  saveData(); renderScoring();
}

function addWicket() {
  scoring.wickets++;
  scoring.balls++; scoring.totalBalls++;
  scoringBatsman(scoring.striker).balls++;
  scoringBatsman(scoring.striker).out = true;
  scoringBowler(scoring.bowler).runs += 0;
  scoringBowler(scoring.bowler).balls++;
  scoringBowler(scoring.bowler).wickets++;
  scoring.ballLog.push("W");
  saveData(); renderScoring();
}

function undoLast() {
  // Simple undo: remove last ball log entry and re-render
  if (scoring.ballLog.length === 0) return;
  scoring.ballLog.pop();
  // Note: full undo state would require a history stack; this just removes the visual
  renderScoring();
}

function endOver() {
  const newBowler = document.getElementById('sc-new-bowler')?.value?.trim();
  if (!newBowler) { alert("Enter new bowler name."); return; }
  scoring.bowler = newBowler;
  scoringBowler(newBowler);
  scoring.balls = 0;
  scoring.ballLog = [];
  // Swap striker/non-striker at end of over
  const tmp = scoring.striker; scoring.striker = scoring.nonStriker; scoring.nonStriker = tmp;
  saveData(); renderScoring();
}

function newBatsman() {
  const name = document.getElementById('sc-new-bat')?.value?.trim();
  if (!name) return;
  scoring.striker = name;
  scoringBatsman(name);
  renderScoring();
}

function swapEnds() {
  const tmp = scoring.striker; scoring.striker = scoring.nonStriker; scoring.nonStriker = tmp;
  renderScoring();
}

function changeBowler() {
  const name = document.getElementById('sc-mid-bowler')?.value?.trim();
  if (!name) return;
  scoring.bowler = name;
  scoringBowler(name);
  renderScoring();
}

function endInnings() {
  scoring.innings1 = { team:scoring.battingTeam, runs:scoring.runs, wickets:scoring.wickets, totalBalls:scoring.totalBalls };
  scoring.target = scoring.runs + 1;
  // Reset for 2nd innings

  scoring = { ...scoring, active:false, innings:2, battingTeam:bat2, fieldingTeam:field2, runs:0, wickets:0, balls:0, totalBalls:0, extras:{wides:0,noBalls:0,byes:0,legByes:0}, striker:"", nonStriker:"", bowler:"", batsmen:{}, bowlers:{}, ballLog:[] };
  saveData(); renderScoring();
}

function resetScoring() {
  scoring = { active:false, matchName:"", battingTeam:"Athlone CC", fieldingTeam:"", totalOvers:20, matchType:"League", tossWinner:"", tossDecision:"bat", innings:1, runs:0, wickets:0, balls:0, totalBalls:0, extras:{wides:0,noBalls:0,byes:0,legByes:0}, striker:"", nonStriker:"", bowler:"", batsmen:{}, bowlers:{}, ballLog:[], target:null, innings1:null };

// Auto-save whenever any data changes — patch all mutating functions
const _origSave = saveData;
function autosave() { _origSave(); }

// Patch key functions to auto-save after every change
const _patchFns = [
  'savePlayer','deletePlayer','addFixture','deleteFixture','removeMatchPlayer',
  'addEquip','deleteEquip','updateEquip','createPoll','deletePoll','closePoll',
  'castVote','toggleVote','removeVote','saveProfile','assignCategory',
  'togglePlayerForMatch','doneSelectingPlayers'
];
_patchFns.forEach(fn => {
  const orig = window[fn];
  if (orig) window[fn] = function(...args) {
    const result = orig.apply(this, args);
    autosave();
    return result;
  };
});

// ── Google Sheets Sync ────────────────────────────────────────────────────
// Paste your deployed Apps Script Web App URL below after "SYNC_URL ="
const SYNC_URL = "https://script.google.com/macros/s/AKfycbwwl5OzdU79nz2v2O9ykmnFJBahERUG2HPNwX-aljkv_Bm4ahA98Psl1ev-qqrB82L5/exec";

let syncStatus = "idle"; // idle | syncing | success | error

// ── Push data TO sheets ───────────────────────────────────────────────────
function syncToSheets() {
  if (!SYNC_URL) {
    showSyncToast("⚠ No sync URL set. Paste your Apps Script URL into SYNC_URL.", "warn");
    return;
  }
  if (syncStatus === "syncing") return;
  syncStatus = "syncing";
  updateSyncBtn();

  const playerRows = players.map(p => {
    const r = ratings[p.id] || { a:"", b:"" };
    return { ...p, ratingA: r.a, ratingB: r.b };
  });
  const profileRows = Object.entries(profile).map(([field, value]) => ({ field, value }));

  const sheets = [
    { sheet:"Players",   data: playerRows },
    { sheet:"Fixtures",  data: matches },
    { sheet:"Equipment", data: equipment },
    { sheet:"Polls",     data: polls },
    { sheet:"Profile",   data: profileRows },
  ];

  const sendNext = (i) => {
    if (i >= sheets.length) {
      syncStatus = "success";
      updateSyncBtn();
      showSyncToast("✓ Synced to Google Sheets", "success");
      setTimeout(() => { syncStatus = "idle"; updateSyncBtn(); }, 3000);
      return;
    }
    fetch(SYNC_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify(sheets[i]),
    })
    .then(r => r.json())
    .then(res => {
      if (res.ok) sendNext(i + 1);
      else throw new Error(res.error || "Unknown error");
    })
    .catch(err => {
      // Fallback: try no-cors (data likely still written even without response)
      fetch(SYNC_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify(sheets[i]),
      }).then(() => sendNext(i + 1)).catch(() => {
        syncStatus = "error";
        updateSyncBtn();
        showSyncToast("✕ Sync failed — check your URL", "error");
        setTimeout(() => { syncStatus = "idle"; updateSyncBtn(); }, 4000);
      });
    });
  };
  sendNext(0);
}

// ── Pull data FROM sheets ─────────────────────────────────────────────────
function loadFromSheets() {
  if (!SYNC_URL) {
    showSyncToast("⚠ No sync URL set.", "warn");
    return;
  }
  showSyncToast("↓ Loading from Google Sheets…", "warn");
  fetch(SYNC_URL + "?action=read")
    .then(r => r.json())
    .then(res => {
      if (!res.ok || !res.data) throw new Error("No data returned");
      const d = res.data;
      if (d.Players   && d.Players.length)   players   = d.Players;
      if (d.Fixtures  && d.Fixtures.length)   matches   = d.Fixtures;
      if (d.Equipment && d.Equipment.length)  equipment = d.Equipment;
      if (d.Polls     && d.Polls.length)      polls     = d.Polls;
      if (d.Profile   && d.Profile.length) {
        d.Profile.forEach(row => { if (row.field) profile[row.field] = row.value; });
      }
      saveData();
      render();
      showSyncToast("✓ Data loaded from Google Sheets", "success");
    })
    .catch(err => {
      showSyncToast("✕ Load failed — " + err.message, "error");
    });
}

function updateSyncBtn() {
  const btn = document.getElementById("sync-btn");
  if (!btn) return;
  const labels = { idle:"⟳ Sync to Sheets", syncing:"Syncing…", success:"✓ Synced", error:"✕ Failed" };
  const colors = { idle:"var(--accent)", syncing:"var(--muted)", success:"var(--accentB)", error:"#ff2d55" };
  btn.textContent = labels[syncStatus];
  btn.style.color = colors[syncStatus];
  btn.style.borderColor = colors[syncStatus];
  btn.style.opacity = syncStatus === "syncing" ? "0.7" : "1";
  btn.disabled = syncStatus === "syncing";
}

function showSyncToast(msg, type) {
  let toast = document.getElementById("sync-toast");
  if (!toast) {
    toast = document.createElement("div");
    toast.id = "sync-toast";
    toast.style.cssText = "position:fixed;bottom:calc(var(--nav-h) + 12px);left:50%;transform:translateX(-50%);padding:10px 18px;border-radius:4px;font-family:'Courier New',monospace;font-size:12px;font-weight:700;letter-spacing:.06em;z-index:9998;transition:opacity .3s;white-space:nowrap;pointer-events:none";
    document.body.appendChild(toast);
  }
  const styles = {
    success: "background:#00ff9d22;color:#00ff9d;border:1px solid #00ff9d66;box-shadow:0 0 16px #00ff9d33",
    warn:    "background:#ffe50022;color:#ffe500;border:1px solid #ffe50066;box-shadow:0 0 16px #ffe50033",
    error:   "background:#ff2d5522;color:#ff2d55;border:1px solid #ff2d5566;box-shadow:0 0 16px #ff2d5533",
  };
  toast.style.cssText += ";" + styles[type];
  toast.textContent = msg;
  toast.style.opacity = "1";
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => { toast.style.opacity = "0"; }, 3500);
}

// Inject sync button into top bar after render
(function injectSyncBtn() {
  const topbar = document.getElementById("topbar");
  if (!topbar) return;
  const dot = topbar.querySelector(".status-dot");

  // ⟳ Sync to Sheets button
  const syncBtn = document.createElement("button");
  syncBtn.id = "sync-btn";
  syncBtn.textContent = "⟳ Sync";
  syncBtn.title = "Push data to Google Sheets";
  syncBtn.onclick = syncToSheets;
  syncBtn.style.cssText = "margin-left:auto;background:transparent;border:1px solid var(--accent);color:var(--accent);font-family:'Courier New',monospace;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:6px 10px;border-radius:2px;cursor:pointer;box-shadow:var(--glow);transition:all .2s;flex-shrink:0";
  topbar.insertBefore(syncBtn, dot);
})();

</script>
</body>
</html>
